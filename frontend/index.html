<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM-Keyring</title>
  <meta name="description" content="Manage LLM API keys as OS environment variables, from your browser.">

  <!-- Inter font (Apple-style alternative) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- TailwindCSS via CDN (single dev/prod build) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Lucide Icons (outline style, like Apple's SF Symbols) -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <!-- Alpine.js for reactivity -->
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔑</text></svg>">

  <style>
    /* ===== Apple-style base ===== */
    :root {
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', 'Noto Sans SC', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 20px;
      --transition: 200ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { box-sizing: border-box; }
    html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    body {
      font-family: var(--font-sans);
      letter-spacing: -0.011em;
    }
    code, .mono { font-family: var(--font-mono); }

    [x-cloak] { display: none !important; }

    /* ===== Light theme (Apple-like) ===== */
    .theme-light {
      --bg-base: #f5f5f7;
      --bg-card: rgba(255, 255, 255, 0.85);
      --bg-card-solid: #ffffff;
      --bg-hover: rgba(0, 0, 0, 0.04);
      --bg-input: rgba(120, 120, 128, 0.08);
      --border: rgba(60, 60, 67, 0.12);
      --border-strong: rgba(60, 60, 67, 0.2);
      --text-primary: #1d1d1f;
      --text-secondary: #6e6e73;
      --text-tertiary: #8e8e93;
      --accent: #007aff;
      --accent-hover: #0a84ff;
      --success: #34c759;
      --error: #ff3b30;
      --warning: #ff9500;
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
      --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
      --shadow-lg: 0 16px 40px rgba(0, 0, 0, 0.12);
    }

    /* ===== Dark theme (Apple "Pro" dark) ===== */
    .theme-dark {
      --bg-base: #000000;
      --bg-card: rgba(28, 28, 30, 0.75);
      --bg-card-solid: #1c1c1e;
      --bg-hover: rgba(255, 255, 255, 0.06);
      --bg-input: rgba(118, 118, 128, 0.24);
      --border: rgba(255, 255, 255, 0.1);
      --border-strong: rgba(255, 255, 255, 0.18);
      --text-primary: #f5f5f7;
      --text-secondary: #98989d;
      --text-tertiary: #636366;
      --accent: #0a84ff;
      --accent-hover: #409cff;
      --success: #30d158;
      --error: #ff453a;
      --warning: #ff9f0a;
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 16px 40px rgba(0, 0, 0, 0.5);
    }

    body {
      background: var(--bg-base);
      color: var(--text-primary);
      transition: background var(--transition), color var(--transition);
    }

    /* ===== Glass card ===== */
    .glass {
      background: var(--bg-card);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
    }

    /* ===== Buttons ===== */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: var(--radius-md);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: -0.01em;
      transition: all var(--transition);
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--text-primary);
      user-select: none;
    }
    .btn:hover { background: var(--bg-hover); }
    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: var(--accent);
      color: white;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
    }
    .btn-primary:hover { background: var(--accent-hover); }

    .btn-danger {
      background: var(--error);
      color: white;
    }

    .btn-icon {
      width: 32px;
      height: 32px;
      padding: 0;
      justify-content: center;
      border-radius: var(--radius-sm);
    }

    /* ===== Inputs ===== */
    .input {
      width: 100%;
      padding: 9px 12px;
      font-size: 13px;
      background: var(--bg-input);
      border: 1px solid transparent;
      border-radius: var(--radius-md);
      color: var(--text-primary);
      outline: none;
      transition: all var(--transition);
      font-family: var(--font-sans);
    }
    .input::placeholder { color: var(--text-tertiary); }
    .input:focus {
      background: var(--bg-card-solid);
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(10, 132, 255, 0.15);
    }

    /* ===== Toast (top, slide-down) ===== */
    .toast {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      padding: 10px 18px;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      font-size: 13px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      animation: toastIn 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .toast-success { background: rgba(52, 199, 89, 0.95); color: white; }
    .toast-error { background: rgba(255, 59, 48, 0.95); color: white; }
    .toast-info { background: rgba(28, 28, 30, 0.92); color: white; }
    @keyframes toastIn {
      from { transform: translate(-50%, -120%); opacity: 0; }
      to { transform: translate(-50%, 0); opacity: 1; }
    }

    /* ===== Modal ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
      animation: fadeIn 0.2s ease;
    }
    .modal {
      background: var(--bg-card-solid);
      border-radius: var(--radius-xl);
      width: 100%;
      max-width: 440px;
      max-height: 85vh;
      overflow: hidden;
      box-shadow: var(--shadow-lg);
      animation: modalIn 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes modalIn {
      from { transform: scale(0.95); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    /* ===== Sidebar template item hover ===== */
    .template-item {
      transition: all var(--transition);
      cursor: pointer;
    }
    .template-item:hover {
      background: var(--bg-hover);
    }

    /* ===== Tab pill (Managed / Discover) ===== */
    .tab-pill {
      display: inline-flex;
      padding: 2px;
      background: var(--bg-input);
      border-radius: 999px;
      gap: 2px;
    }
    .tab-pill button {
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 500;
      border-radius: 999px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--transition);
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .tab-pill button.active {
      background: var(--bg-card-solid);
      color: var(--text-primary);
      box-shadow: var(--shadow-sm);
    }

    /* ===== Confidence dot ===== */
    .confidence-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .conf-high { background: #34c759; }
    .conf-medium { background: #ff9500; }
    .conf-low { background: #8e8e93; }

    /* ===== Scrollbar ===== */
    .nice-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
    .nice-scroll::-webkit-scrollbar-track { background: transparent; }
    .nice-scroll::-webkit-scrollbar-thumb { background: rgba(120, 120, 128, 0.3); border-radius: 3px; }

    /* ===== Row hover ===== */
    .row { transition: background var(--transition); }
    .row:hover { background: var(--bg-hover); }

    /* ===== i18n visibility ===== */
    [data-lang="en"] .i18n-zh { display: none; }
    [data-lang="zh"] .i18n-en { display: none; }
  </style>
</head>

<body
  class="theme-light h-full"
  data-lang="en"
  x-data="keyring()"
  x-init="init()"
  x-cloak
>

  <!-- ============ TOAST ============ -->
  <template x-if="toast.visible">
    <div
      class="toast"
      :class="`toast-${toast.type}`"
      x-transition.opacity.duration.150ms
    >
      <span x-text="toast.type === 'success' ? '✓' : toast.type === 'error' ? '✕' : 'ⓘ'"></span>
      <span x-text="toast.message"></span>
    </div>
  </template>

  <!-- ============ HEADER ============ -->
  <header class="sticky top-0 z-30 glass">
    <div class="max-w-6xl mx-auto px-6 h-14 flex items-center gap-4">

      <!-- Logo -->
      <div class="flex items-center gap-2.5">
        <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white text-sm shadow-sm">
          🔑
        </div>
        <div>
          <div class="text-[14px] font-semibold tracking-tight leading-tight">
            <span class="i18n-en">LLM-Keyring</span>
            <span class="i18n-zh">LLM-Keyring</span>
          </div>
          <div class="text-[11px] text-secondary -mt-0.5" style="color: var(--text-tertiary);">
            <span class="i18n-en">v0.2.0 · Only what you manage</span>
            <span class="i18n-zh">v0.2.0 · 只管理你标记的</span>
          </div>
        </div>
      </div>

      <!-- Spacer -->
      <div class="flex-1"></div>

      <!-- View switcher (Managed / Discover) -->
      <div class="tab-pill">
        <button
          :class="{ active: view === 'managed' }"
          @click="switchView('managed')"
        >
          <i data-lucide="shield-check" class="w-3.5 h-3.5"></i>
          <span class="i18n-en">Managed</span>
          <span class="i18n-zh">已管理</span>
          <span x-show="managedKeys.length > 0" x-text="managedKeys.length" class="text-[10px] opacity-60"></span>
        </button>
        <button
          :class="{ active: view === 'discover' }"
          @click="switchView('discover')"
        >
          <i data-lucide="search" class="w-3.5 h-3.5"></i>
          <span class="i18n-en">Discover</span>
          <span class="i18n-zh">发现</span>
          <span x-show="discover.adoptable.length > 0" x-text="discover.adoptable.length" class="text-[10px] opacity-60" style="background: var(--success); color: white; border-radius: 999px; padding: 0 5px;"></span>
        </button>
        <button
          :class="{ active: view === 'chat' }"
          @click="switchView('chat')"
        >
          <i data-lucide="message-circle" class="w-3.5 h-3.5"></i>
          <span class="i18n-en">Chat</span>
          <span class="i18n-zh">对话</span>
        </button>
      </div>

      <!-- Action buttons -->
      <div class="flex items-center gap-1">
        <button @click="openImport()" class="btn btn-icon" title="Import .env">
          <i data-lucide="upload" class="w-4 h-4"></i>
        </button>
        <button @click="exportEnv()" class="btn btn-icon" :title="t('export')">
          <i data-lucide="download" class="w-4 h-4"></i>
        </button>
        <button @click="openAdd()" class="btn btn-primary" style="padding: 7px 14px;">
          <i data-lucide="plus" class="w-3.5 h-3.5"></i>
          <span class="i18n-en">Add Key</span>
          <span class="i18n-zh">添加 Key</span>
        </button>
      </div>

      <!-- Language toggle -->
      <button
        @click="toggleLang()"
        class="btn"
        style="padding: 7px 10px; font-size: 12px;"
        title="Switch language"
      >
        <span x-text="lang === 'en' ? 'EN' : '中'"></span>
        <span style="opacity: 0.4;">|</span>
        <span :style="{ color: lang === 'en' ? 'var(--text-tertiary)' : 'var(--text-primary)' }">EN</span>
        <span :style="{ color: lang === 'zh' ? 'var(--text-primary)' : 'var(--text-tertiary)' }">中</span>
      </button>

      <!-- Theme toggle -->
      <button
        @click="toggleDark()"
        class="btn btn-icon"
        :title="dark ? t('lightMode') : t('darkMode')"
      >
        <i :data-lucide="dark ? 'sun' : 'moon'" class="w-4 h-4"></i>
      </button>
    </div>
  </header>

  <!-- ============ BACKEND DOWN BANNER ============ -->
  <div
    x-show="backendDown"
    x-transition.opacity
    class="sticky top-14 z-20"
    style="display: none;"
  >
    <div
      class="max-w-6xl mx-auto px-6 py-2 mt-2 rounded-lg flex items-center gap-3"
      style="background: rgba(255, 59, 48, 0.12); border: 1px solid rgba(255, 59, 48, 0.3); color: var(--error);"
    >
      <i data-lucide="wifi-off" class="w-4 h-4 flex-shrink-0"></i>
      <div class="flex-1 text-[13px]">
        <span class="font-medium">
          <span class="i18n-en">Backend not responding</span>
          <span class="i18n-zh">后端无响应</span>
        </span>
        <span class="ml-2 opacity-80">
          <span class="i18n-en">Restart llm-keyring.exe or run <code class="px-1 rounded bg-black/10">start.bat</code></span>
          <span class="i18n-zh">请重启 llm-keyring.exe 或运行 <code class="px-1 rounded bg-black/10">start.bat</code></span>
        </span>
      </div>
      <button @click="retryBackend()" class="btn" style="padding: 4px 10px; font-size: 12px;">
        <i data-lucide="refresh-cw" class="w-3 h-3"></i>
        <span class="i18n-en">Retry</span>
        <span class="i18n-zh">重试</span>
      </button>
    </div>
  </div>

  <!-- ============ MAIN ============ -->
  <main class="max-w-6xl mx-auto px-6 py-8">

    <!-- ============ MANAGED VIEW ============ -->
    <div x-show="view === 'managed'" x-transition.opacity.duration.150ms>

      <!-- Search bar -->
      <div class="mb-5 flex items-center gap-3">
        <div class="flex-1 relative">
          <i data-lucide="search" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2" style="color: var(--text-tertiary);"></i>
          <input
            type="text"
            x-model="search"
            class="input"
            style="padding-left: 36px;"
            :placeholder="t('searchKeys')"
          />
        </div>
        <button @click="refresh()" class="btn">
          <i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i>
          <span x-text="t('refresh')"></span>
        </button>
      </div>

      <!-- Empty state -->
      <div
        x-show="!loading && filteredManagedKeys.length === 0"
        class="glass rounded-2xl p-16 text-center"
      >
        <div class="w-16 h-16 mx-auto mb-5 rounded-2xl bg-gradient-to-br from-indigo-500/20 to-purple-600/20 flex items-center justify-center text-3xl">
          🔑
        </div>
        <h3 class="text-[17px] font-semibold mb-1.5" x-text="search ? t('noMatch') : t('emptyTitle')"></h3>
        <p class="text-[13px] mb-6" style="color: var(--text-secondary);" x-show="!search" x-text="t('emptyDesc')"></p>
        <div class="flex items-center justify-center gap-2" x-show="!search">
          <button @click="openAdd()" class="btn btn-primary">
            <i data-lucide="plus" class="w-3.5 h-3.5"></i>
            <span x-text="t('addFirst')"></span>
          </button>
          <button
            @click="switchView('discover')"
            class="btn"
            x-show="discover.adoptable.length > 0"
          >
            <i data-lucide="search" class="w-3.5 h-3.5"></i>
            <span x-text="t('discoverN').replace('{n}', discover.adoptable.length)"></span>
          </button>
        </div>
      </div>

      <!-- Key list -->
      <div class="glass rounded-2xl overflow-hidden">
        <template x-for="(key, idx) in filteredManagedKeys" :key="key.name">
          <div
            :class="idx > 0 ? '' : ''"
            class="row px-5 py-4 flex items-center gap-4 group"
            :style="idx > 0 ? 'border-top: 1px solid var(--border);' : ''"
          >
            <!-- Icon -->
            <div class="w-9 h-9 rounded-lg flex items-center justify-center flex-shrink-0"
                 style="background: linear-gradient(135deg, rgba(99, 102, 241, 0.15), rgba(168, 85, 247, 0.15));">
              <i data-lucide="key" class="w-4 h-4" style="color: var(--accent);"></i>
            </div>

            <!-- Name + masked value -->
            <div class="flex-1 min-w-0">
              <div class="flex items-baseline gap-2">
                <code class="mono text-[13px] font-semibold truncate" x-text="key.name"></code>
                <span class="text-[11px]" style="color: var(--text-tertiary);" x-text="key.length + ' ' + t('chars')"></span>
              </div>
              <div class="mt-0.5">
                <code class="mono text-[11.5px]" style="color: var(--text-secondary);" x-text="key.masked_value"></code>
              </div>
            </div>

            <!-- Actions -->
            <div class="flex items-center gap-0.5 opacity-50 group-hover:opacity-100 transition">
              <button @click="copyValue(key.name)" class="btn btn-icon" :title="t('copy')">
                <i data-lucide="copy" class="w-3.5 h-3.5"></i>
              </button>
              <button @click="showValue(key.name)" class="btn btn-icon" :title="t('show')">
                <i data-lucide="eye" class="w-3.5 h-3.5"></i>
              </button>
              <button @click="openEdit(key.name)" class="btn btn-icon" :title="t('edit')">
                <i data-lucide="pencil" class="w-3.5 h-3.5"></i>
              </button>
              <button @click="confirmDelete(key.name)" class="btn btn-icon" :title="t('delete')">
                <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
              </button>
            </div>
          </div>
        </template>
      </div>

      <!-- Tip when empty + has discoverable -->
      <div
        x-show="managedKeys.length === 0 && discover.adoptable.length > 0 && !loading"
        class="mt-5 glass rounded-2xl p-5 flex items-start gap-3"
        style="background: linear-gradient(135deg, rgba(52, 199, 89, 0.08), rgba(10, 132, 255, 0.08));"
      >
        <i data-lucide="sparkles" class="w-5 h-5 mt-0.5" style="color: var(--success);"></i>
        <div class="flex-1">
          <p class="text-[13px] font-medium" x-text="t('tipFound').replace('{n}', discover.adoptable.length)"></p>
          <p class="text-[12px] mt-0.5" style="color: var(--text-secondary);" x-text="t('tipFoundDesc')"></p>
        </div>
        <button @click="switchView('discover')" class="btn btn-primary">
          <span x-text="t('viewDiscover')"></span>
          <i data-lucide="arrow-right" class="w-3.5 h-3.5"></i>
        </button>
      </div>
    </div>

    <!-- ============ DISCOVER VIEW ============ -->
    <div x-show="view === 'discover'" x-transition.opacity.duration.150ms>

      <!-- Discover intro -->
      <div class="mb-5 glass rounded-2xl p-5">
        <div class="flex items-start gap-3">
          <div class="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0"
               style="background: linear-gradient(135deg, rgba(10, 132, 255, 0.15), rgba(52, 199, 89, 0.15));">
            <i data-lucide="radar" class="w-5 h-5" style="color: var(--accent);"></i>
          </div>
          <div class="flex-1">
            <h3 class="text-[14px] font-semibold mb-1" x-text="t('discoverTitle')"></h3>
            <p class="text-[12.5px]" style="color: var(--text-secondary);" x-text="t('discoverDesc')"></p>
          </div>
          <button @click="loadDiscover()" class="btn" :disabled="discoverLoading">
            <i data-lucide="refresh-cw" class="w-3.5 h-3.5" :class="discoverLoading ? 'animate-spin' : ''"></i>
            <span x-text="t('rescan')"></span>
          </button>
        </div>
      </div>

      <!-- Auto-adoptable -->
      <template x-if="discover.adoptable.length > 0">
        <div class="mb-5">
          <div class="flex items-baseline justify-between mb-3">
            <h3 class="text-[13px] font-semibold flex items-center gap-2">
              <span class="confidence-dot conf-high"></span>
              <span class="i18n-en">High Confidence</span>
              <span class="i18n-zh">高置信度</span>
              <span class="text-[11px] font-normal" style="color: var(--text-tertiary);" x-text="discover.adoptable.length + ' ' + t('keys')"></span>
            </h3>
            <button @click="adoptAll()" class="btn btn-primary" style="padding: 5px 12px; font-size: 12px;">
              <i data-lucide="plus" class="w-3 h-3"></i>
              <span x-text="t('adoptAll')"></span>
            </button>
          </div>
          <div class="glass rounded-2xl overflow-hidden">
            <template x-for="(key, idx) in discover.adoptable" :key="key.name">
              <div
                class="row px-5 py-3.5 flex items-center gap-3"
                :style="idx > 0 ? 'border-top: 1px solid var(--border);' : ''"
              >
                <span class="confidence-dot conf-high"></span>
                <div class="flex-1 min-w-0">
                  <code class="mono text-[13px] font-medium" x-text="key.name"></code>
                  <div class="text-[11px]" style="color: var(--text-secondary);" x-text="key.reasons[0]"></div>
                </div>
                <code class="mono text-[11px] hidden sm:block" style="color: var(--text-tertiary);" x-text="key.value_preview"></code>
                <button @click="adoptKey(key.name)" class="btn btn-primary" style="padding: 5px 12px; font-size: 12px;">
                  <span x-text="t('adopt')"></span>
                </button>
              </div>
            </template>
          </div>
        </div>
      </template>

      <!-- Review (medium conf) -->
      <template x-if="discover.review.length > 0">
        <div class="mb-5">
          <h3 class="text-[13px] font-semibold mb-3 flex items-center gap-2">
            <span class="confidence-dot conf-medium"></span>
            <span class="i18n-en">Please Verify</span>
            <span class="i18n-zh">请人工确认</span>
            <span class="text-[11px] font-normal" style="color: var(--text-tertiary);" x-text="discover.review.length + ' ' + t('keys')"></span>
          </h3>
          <div class="glass rounded-2xl overflow-hidden">
            <template x-for="(key, idx) in discover.review" :key="key.name">
              <div
                class="row px-5 py-3.5 flex items-center gap-3"
                :style="idx > 0 ? 'border-top: 1px solid var(--border);' : ''"
              >
                <span class="confidence-dot conf-medium"></span>
                <div class="flex-1 min-w-0">
                  <div class="flex items-center gap-2">
                    <code class="mono text-[13px] font-medium" x-text="key.name"></code>
                    <span x-show="key.is_managed" class="text-[10px] px-1.5 py-0.5 rounded-md" style="background: var(--bg-input); color: var(--text-secondary);" x-text="t('alreadyManaged')"></span>
                  </div>
                  <div class="text-[11px]" style="color: var(--text-secondary);">
                    <span x-text="key.reasons.join(' · ') || t('unclearMatch')"></span>
                  </div>
                </div>
                <button
                  @click="adoptKey(key.name)"
                  class="btn"
                  style="padding: 5px 12px; font-size: 12px;"
                  x-show="!key.is_managed"
                  x-text="t('adopt')"
                ></button>
                <button
                  @click="unadoptKey(key.name)"
                  class="btn"
                  style="padding: 5px 12px; font-size: 12px; color: var(--text-secondary);"
                  x-show="key.is_managed"
                  x-text="t('remove')"
                ></button>
              </div>
            </template>
          </div>
        </div>
      </template>

      <!-- Nothing found -->
      <template x-if="discover.adoptable.length === 0 && discover.review.length === 0">
        <div class="glass rounded-2xl p-12 text-center">
          <i data-lucide="check-circle" class="w-12 h-12 mx-auto mb-3" style="color: var(--success);"></i>
          <h3 class="text-[15px] font-semibold mb-1.5" x-text="t('allCaughtUp')"></h3>
          <p class="text-[13px]" style="color: var(--text-secondary);" x-text="t('allCaughtUpDesc').replace('{total}', discover.total_scanned)"></p>
        </div>
      </template>

      <!-- Always show: manual add -->
      <div class="glass rounded-2xl p-5 mt-5" style="border-style: dashed;">
        <div class="flex items-start gap-3">
          <div class="w-9 h-9 rounded-lg flex items-center justify-center flex-shrink-0"
               style="background: var(--bg-input);">
            <i data-lucide="plus-circle" class="w-4 h-4" style="color: var(--text-secondary);"></i>
          </div>
          <div class="flex-1">
            <h4 class="text-[13px] font-semibold mb-0.5" x-text="t('customTitle')"></h4>
            <p class="text-[12px]" style="color: var(--text-secondary);" x-text="t('customDesc')"></p>
          </div>
          <button @click="openAdd()" class="btn">
            <i data-lucide="plus" class="w-3.5 h-3.5"></i>
            <span x-text="t('addManually')"></span>
          </button>
        </div>
      </div>

      <!-- Skipped count footer -->
      <div class="mt-5 text-center text-[12px]" style="color: var(--text-tertiary);">
        <span x-text="t('skippedCount').replace('{n}', discover.skipped_count).replace('{total}', discover.total_scanned)"></span>
        ·
        <button @click="showSkipped = !showSkipped" class="underline" x-text="showSkipped ? t('hide') : t('show')"></button>
      </div>

      <!-- Hidden skipped detail -->
      <template x-if="showSkipped">
        <div class="mt-3 glass rounded-xl p-4 text-[11px] mono" style="color: var(--text-tertiary);">
          <p x-text="t('skippedNote')"></p>
        </div>
      </template>
    </div>

    <!-- ============ CHAT VIEW ============ -->
    <div x-show="view === 'chat'" x-transition.opacity.duration.150ms>

      <!-- No managed keys: nudge to add first -->
      <div
        x-show="managedKeys.length === 0"
        class="glass rounded-2xl p-12 text-center"
      >
        <i data-lucide="message-circle" class="w-12 h-12 mx-auto mb-3" style="color: var(--text-tertiary);"></i>
        <h3 class="text-[16px] font-semibold mb-1" x-text="t('chatEmptyTitle')"></h3>
        <p class="text-[13px] mb-4" style="color: var(--text-secondary);" x-text="t('chatEmptyDesc')"></p>
        <button @click="switchView('managed')" class="btn btn-primary">
          <i data-lucide="plus" class="w-3.5 h-3.5"></i>
          <span x-text="t('addFirst')"></span>
        </button>
      </div>

      <!-- Chat interface (only when we have keys) -->
      <div x-show="managedKeys.length > 0" class="grid grid-cols-1 gap-4" style="grid-template-columns: 320px 1fr;">

        <!-- LEFT: key/model picker + capabilities -->
        <aside class="glass rounded-2xl p-4 space-y-4">
          <!-- Key selector -->
          <div>
            <label class="block text-[10px] font-semibold uppercase tracking-wider mb-1.5" style="color: var(--text-tertiary);">
              <span x-text="t('chatKey')"></span>
            </label>
            <select
              x-model="chatState.keyName"
              @change="onChatKeyChange()"
              class="input"
              style="font-family: var(--font-mono); font-size: 12px;"
            >
              <option value="">
                <span x-text="t('chatSelectKey')"></span>
              </option>
              <template x-for="k in managedKeys" :key="k.name">
                <option :value="k.name" x-text="k.name"></option>
              </template>
            </select>
          </div>

          <!-- Base URL (editable, prefilled from preset) -->
          <div>
            <label class="block text-[10px] font-semibold uppercase tracking-wider mb-1.5" style="color: var(--text-tertiary);">
              <span x-text="t('chatBaseUrl')"></span>
            </label>
            <input
              type="text"
              x-model="chatState.baseUrl"
              placeholder="https://api.openai.com/v1"
              class="input"
              style="font-family: var(--font-mono); font-size: 11px;"
            />
          </div>

          <!-- Model selector -->
          <div>
            <label class="block text-[10px] font-semibold uppercase tracking-wider mb-1.5" style="color: var(--text-tertiary);">
              <span x-text="t('chatModel')"></span>
            </label>
            <input
              type="text"
              x-model="chatState.model"
              list="chat-model-list"
              placeholder="gpt-4o"
              class="input"
              style="font-family: var(--font-mono); font-size: 12px;"
            />
            <datalist id="chat-model-list">
              <template x-for="m in chatState.modelSuggestions" :key="m">
                <option :value="m"></option>
              </template>
            </datalist>
            <button
              @click="loadModelsForChatKey()"
              class="mt-1.5 text-[11px] underline"
              style="color: var(--text-tertiary);"
              :disabled="chatState.loadingModels"
            >
              <span x-text="chatState.loadingModels ? t('chatLoadingModels') : t('chatRefreshModels')"></span>
            </button>
          </div>

          <!-- Test button + capability matrix -->
          <div class="pt-2" style="border-top: 1px solid var(--border);">
            <button
              @click="testChatKey()"
              class="btn btn-primary w-full"
              style="justify-content: center;"
              :disabled="!chatState.keyName || chatState.testing"
            >
              <i data-lucide="radar" class="w-3.5 h-3.5"></i>
              <span x-text="chatState.testing ? t('chatTesting') : t('chatTestBtn')"></span>
            </button>

            <div x-show="chatState.testResult" class="mt-3 space-y-1.5">
              <div class="text-[10px] font-semibold uppercase tracking-wider mb-1" style="color: var(--text-tertiary);">
                <span x-text="t('chatCapabilities')"></span>
              </div>
              <template x-for="r in (chatState.testResult?.results || [])" :key="r.name">
                <div class="flex items-center gap-2 text-[12px]">
                  <span
                    class="confidence-dot"
                    :class="r.supported ? 'conf-high' : (r.status === 'skipped' ? 'conf-low' : 'conf-medium')"
                    :style="r.supported ? 'background: #34c759;' : (r.status === 'skipped' ? 'background: #8e8e93;' : 'background: #ff3b30;')"
                  ></span>
                  <span class="flex-1" x-text="r.label"></span>
                  <span class="text-[10px] mono" style="color: var(--text-tertiary);" x-text="r.status"></span>
                </div>
              </template>
              <p
                x-show="chatState.testResult?.summary"
                class="text-[11px] mt-2"
                style="color: var(--text-secondary);"
                x-text="chatState.testResult?.summary"
              ></p>
            </div>
          </div>
        </aside>

        <!-- RIGHT: messages -->
        <section class="glass rounded-2xl flex flex-col" style="height: calc(100vh - 12rem); min-height: 480px;">

          <!-- Messages area -->
          <div
            x-ref="chatMessages"
            class="flex-1 overflow-y-auto p-5 space-y-4 nice-scroll"
          >
            <!-- Empty state inside chat -->
            <div
              x-show="chatState.messages.length === 0"
              class="text-center py-12"
              style="color: var(--text-tertiary);"
            >
              <i data-lucide="message-circle" class="w-10 h-10 mx-auto mb-2" style="opacity: 0.5;"></i>
              <p class="text-[13px]" x-text="t('chatStartHint')"></p>
            </div>

            <template x-for="(msg, idx) in chatState.messages" :key="idx">
              <div
                :class="msg.role === 'user' ? 'flex justify-end' : 'flex justify-start'"
              >
                <div
                  class="max-w-[80%] rounded-2xl px-4 py-2.5 text-[13.5px] leading-relaxed"
                  :style="msg.role === 'user'
                    ? 'background: var(--accent); color: white;'
                    : 'background: var(--bg-input); color: var(--text-primary);'"
                >
                  <!-- Role label -->
                  <div
                    class="text-[10px] font-semibold uppercase tracking-wider mb-1 opacity-70"
                    x-text="msg.role === 'user'
                      ? (lang === 'zh' ? '你' : 'You')
                      : (chatState.keyName || 'AI')"
                  ></div>
                  <!-- Content -->
                  <div class="whitespace-pre-wrap break-words" x-text="msg.content"></div>
                  <!-- Error indicator -->
                  <div
                    x-show="msg.error"
                    class="mt-2 text-[11px] flex items-center gap-1"
                    style="color: var(--error);"
                  >
                    <i data-lucide="alert-circle" class="w-3 h-3"></i>
                    <span x-text="msg.error"></span>
                  </div>
                </div>
              </div>
            </template>

            <!-- Streaming indicator -->
            <div
              x-show="chatState.streaming"
              class="flex justify-start"
            >
              <div
                class="rounded-2xl px-4 py-2.5 text-[13px] flex items-center gap-2"
                style="background: var(--bg-input); color: var(--text-tertiary);"
              >
                <span class="flex gap-1">
                  <span class="w-1.5 h-1.5 rounded-full" style="background: currentColor; animation: pulse 1.2s infinite;"></span>
                  <span class="w-1.5 h-1.5 rounded-full" style="background: currentColor; animation: pulse 1.2s infinite 0.2s;"></span>
                  <span class="w-1.5 h-1.5 rounded-full" style="background: currentColor; animation: pulse 1.2s infinite 0.4s;"></span>
                </span>
                <span x-text="t('chatTyping')"></span>
              </div>
            </div>
          </div>

          <!-- Input area -->
          <div class="p-4" style="border-top: 1px solid var(--border);">
            <div class="flex gap-2">
              <textarea
                x-ref="chatInput"
                x-model="chatState.input"
                @keydown.enter.exact.prevent="sendChat()"
                @keydown.shift.enter.exact=""
                :placeholder="t('chatInputPlaceholder')"
                :disabled="!chatState.keyName || chatState.streaming"
                rows="2"
                class="input flex-1 resize-none"
                style="font-size: 13px;"
              ></textarea>
              <div class="flex flex-col gap-1.5">
                <button
                  @click="sendChat()"
                  class="btn btn-primary"
                  :disabled="!chatState.keyName || !chatState.input.trim() || chatState.streaming"
                  style="height: 100%; min-height: 56px; padding: 0 16px;"
                >
                  <i data-lucide="send" class="w-4 h-4"></i>
                </button>
                <button
                  @click="clearChat()"
                  class="btn"
                  style="padding: 4px 10px; font-size: 11px;"
                  :disabled="chatState.messages.length === 0"
                >
                  <span x-text="t('chatClear')"></span>
                </button>
              </div>
            </div>
            <p class="text-[10.5px] mt-1.5" style="color: var(--text-tertiary);">
              <span x-text="t('chatEnterHint')"></span>
            </p>
          </div>
        </section>

      </div>
    </div>

    <!-- ============ TEMPLATE SIDEBAR (overlay on Managed view) ============ -->
    <div
      x-show="templatesOpen"
      x-transition.opacity
      @click.self="templatesOpen = false"
      class="fixed inset-0 z-40 flex justify-end"
      style="background: rgba(0,0,0,0.3); backdrop-filter: blur(8px);"
    >
      <aside
        x-show="templatesOpen"
        x-transition:enter="transition ease-out duration-200"
        x-transition:enter-start="translate-x-full"
        x-transition:enter-end="translate-x-0"
        class="w-80 max-w-[85vw] h-full overflow-y-auto nice-scroll"
        style="background: var(--bg-card-solid); border-left: 1px solid var(--border);"
      >
        <div class="sticky top-0 px-5 py-4 flex items-center justify-between" style="background: var(--bg-card-solid); border-bottom: 1px solid var(--border);">
          <h3 class="text-[14px] font-semibold" x-text="t('templates')"></h3>
          <button @click="templatesOpen = false" class="btn btn-icon">
            <i data-lucide="x" class="w-4 h-4"></i>
          </button>
        </div>

        <div class="px-4 py-3">
          <input
            type="text"
            x-model="templateSearch"
            class="input"
            :placeholder="t('searchTemplates')"
          />
        </div>

        <template x-for="(group, category) in groupedTemplates()" :key="category">
          <div class="py-2">
            <h4 class="px-5 py-1.5 text-[10.5px] font-semibold uppercase tracking-wider" style="color: var(--text-tertiary);" x-text="category"></h4>
            <template x-for="t in group" :key="t.name">
              <div
                @click="applyTemplate(t)"
                class="template-item px-5 py-2 flex items-center justify-between"
              >
                <div class="min-w-0 flex-1">
                  <div class="mono text-[12.5px] truncate" x-text="t.name"></div>
                  <div class="text-[11px] truncate" style="color: var(--text-secondary);" x-text="t.provider"></div>
                </div>
                <i data-lucide="plus" class="w-3.5 h-3.5 opacity-0 group-hover:opacity-100" style="color: var(--text-tertiary);"></i>
              </div>
            </template>
          </div>
        </template>

        <div x-show="filteredTemplates().length === 0" class="px-5 py-8 text-center text-[12px]" style="color: var(--text-tertiary);">
          <span x-text="t('noTemplates')"></span>
        </div>
      </aside>
    </div>

    <!-- Floating template button (Managed view only) -->
    <button
      x-show="view === 'managed'"
      @click="templatesOpen = true"
      class="fixed bottom-6 right-6 w-12 h-12 rounded-full btn-primary flex items-center justify-center"
      style="box-shadow: var(--shadow-lg); padding: 0;"
      :title="t('templates')"
    >
      <i data-lucide="bookmark" class="w-5 h-5"></i>
    </button>
  </main>

  <!-- ============ MODAL: Add / Edit ============ -->
  <div x-show="modal.open" class="modal-overlay" @click.self="closeModal()" @keydown.escape.window="closeModal()" x-transition.opacity>
    <div class="modal">
      <div class="px-6 pt-5 pb-3">
        <h3 class="text-[16px] font-semibold" x-text="modal.mode === 'edit' ? t('editKey') : t('addNewKey')"></h3>
      </div>
      <div class="px-6 py-3 space-y-4">
        <div>
          <label class="block text-[11px] font-medium uppercase tracking-wide mb-1.5" style="color: var(--text-secondary);" x-text="t('name')"></label>
          <input
            type="text"
            x-model="modal.name"
            :disabled="modal.mode === 'edit'"
            placeholder="OPENAI_API_KEY"
            class="input mono"
            style="font-size: 13px;"
          />
          <p x-show="modal.error" x-text="modal.error" class="text-[11px] mt-1" style="color: var(--error);"></p>
        </div>
        <div>
          <label class="block text-[11px] font-medium uppercase tracking-wide mb-1.5" style="color: var(--text-secondary);" x-text="t('value')"></label>
          <div class="relative">
            <input
              :type="modal.showValue ? 'text' : 'password'"
              x-model="modal.value"
              @keydown.enter="submitModal()"
              placeholder="sk-..."
              class="input mono pr-16"
              style="font-size: 13px;"
            />
            <button
              type="button"
              @click="modal.showValue = !modal.showValue"
              class="absolute right-1.5 top-1/2 -translate-y-1/2 px-2 py-1 text-[11px] rounded"
              style="color: var(--text-secondary);"
              x-text="modal.showValue ? t('hide') : t('show')"
            ></button>
          </div>
        </div>
      </div>
      <div class="px-6 py-4 flex justify-end gap-2" style="background: var(--bg-input);">
        <button @click="closeModal()" class="btn" x-text="t('cancel')"></button>
        <button @click="submitModal()" class="btn btn-primary" x-text="modal.mode === 'edit' ? t('update') : t('add')"></button>
      </div>
    </div>
  </div>

  <!-- ============ MODAL: Show Value ============ -->
  <div x-show="showValueModal.open" class="modal-overlay" @click.self="showValueModal.open = false" @keydown.escape.window="showValueModal.open = false" x-transition.opacity>
    <div class="modal" style="max-width: 500px;">
      <div class="px-6 pt-5 pb-3 flex items-center justify-between">
        <h3 class="text-[16px] font-semibold"><code class="mono" x-text="showValueModal.name"></code></h3>
        <button @click="showValueModal.open = false" class="btn btn-icon"><i data-lucide="x" class="w-4 h-4"></i></button>
      </div>
      <div class="px-6 py-3">
        <textarea
          readonly
          x-model="showValueModal.value"
          rows="4"
          class="input mono"
          style="resize: none; font-size: 12px;"
        ></textarea>
        <p class="text-[11px] mt-2" style="color: var(--text-tertiary);" x-text="t('sensitiveNote')"></p>
      </div>
      <div class="px-6 py-4 flex justify-end gap-2" style="background: var(--bg-input);">
        <button @click="showValueModal.open = false" class="btn" x-text="t('close')"></button>
        <button @click="copyToClipboard(showValueModal.value, t('copied'))" class="btn btn-primary" x-text="t('copy')"></button>
      </div>
    </div>
  </div>

  <!-- ============ MODAL: Import .env ============ -->
  <div x-show="importModal.open" class="modal-overlay" @click.self="importModal.open = false" @keydown.escape.window="importModal.open = false" x-transition.opacity>
    <div class="modal" style="max-width: 560px;">
      <div class="px-6 pt-5 pb-3">
        <h3 class="text-[16px] font-semibold" x-text="t('importTitle')"></h3>
        <p class="text-[12px] mt-0.5" style="color: var(--text-secondary);" x-text="t('importDesc')"></p>
      </div>
      <div class="px-6 py-3">
        <textarea
          x-model="importModal.content"
          rows="10"
          placeholder="OPENAI_API_KEY=sk-..."
          class="input mono"
          style="resize: none; font-size: 12px;"
        ></textarea>
      </div>
      <div class="px-6 py-4 flex justify-end gap-2" style="background: var(--bg-input);">
        <button @click="importModal.open = false" class="btn" x-text="t('cancel')"></button>
        <button @click="submitImport()" class="btn btn-primary" x-text="t('importBtn')"></button>
      </div>
    </div>
  </div>

  <!-- ============ MODAL: Confirm Delete ============ -->
  <div x-show="confirmDeleteModal.open" class="modal-overlay" @click.self="confirmDeleteModal.open = false" @keydown.escape.window="confirmDeleteModal.open = false" x-transition.opacity>
    <div class="modal" style="max-width: 380px;">
      <div class="px-6 pt-5 pb-3">
        <div class="flex items-start gap-3">
          <div class="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0"
               style="background: rgba(255, 59, 48, 0.12);">
            <i data-lucide="alert-triangle" class="w-5 h-5" style="color: var(--error);"></i>
          </div>
          <div>
            <h3 class="text-[15px] font-semibold mb-1" x-text="t('deleteTitle')"></h3>
            <p class="text-[12.5px]" style="color: var(--text-secondary);" x-text="t('deleteDesc')"></p>
          </div>
        </div>
      </div>
      <div class="px-6 py-4 flex justify-end gap-2" style="background: var(--bg-input);">
        <button @click="confirmDeleteModal.open = false" class="btn" x-text="t('cancel')"></button>
        <button @click="executeDelete()" class="btn btn-danger" x-text="t('delete')"></button>
      </div>
    </div>
  </div>

  <!-- ============ ALPINE.JS APP ============ -->
  <script>
    // ===== i18n dictionary =====
    const I18N = {
      en: {
        searchKeys: 'Search keys…',
        refresh: 'Refresh',
        noMatch: 'No keys match',
        emptyTitle: 'No managed keys yet',
        emptyDesc: 'Add your first key, or scan your machine for ones already set up.',
        addFirst: 'Add Your First Key',
        discoverN: 'Adopt {n} discovered',
        copy: 'Copy',
        show: 'Show',
        edit: 'Edit',
        delete: 'Delete',
        darkMode: 'Dark mode',
        lightMode: 'Light mode',
        export: 'Export .env',
        name: 'Name',
        value: 'Value',
        add: 'Add',
        update: 'Update',
        cancel: 'Cancel',
        close: 'Close',
        copied: 'Copied',
        hide: 'Hide',
        show2: 'Show',
        editKey: 'Edit Key',
        addNewKey: 'Add New Key',
        importTitle: 'Import .env',
        importDesc: 'Paste .env content. Each KEY=VALUE line becomes a managed key.',
        importBtn: 'Import',
        deleteTitle: 'Delete this key?',
        deleteDesc: 'This will permanently remove the env var and forget it.',
        sensitiveNote: '⚠ This value is sensitive. Don\'t share screenshots.',
        templates: 'Templates',
        searchTemplates: 'Search templates…',
        noTemplates: 'No templates match',

    function keyring() {
      return {
        // ===== State =====
        view: 'managed',
        managedKeys: [],
        discover: { adoptable: [], review: [], skipped_count: 0, total_scanned: 0 },
        templates: [],
        info: null,
        search: '',
        templateSearch: '',
        loading: false,
        discoverLoading: false,
        dark: false,
        lang: 'en',
        templatesOpen: false,
        showSkipped: false,
        backendDown: false,

        // Chat state
        chatState: {
          keyName: '',
          baseUrl: '',
          model: '',
          modelSuggestions: [],
          messages: [],   // [{role: 'user'|'assistant', content: str, error?: str}]
          input: '',
          streaming: false,
          testing: false,
          loadingModels: false,
          testResult: null,
        },

        toast: { visible: false, message: '', type: 'info' },
        modal: { open: false, mode: 'create', name: '', value: '', error: '', showValue: false },
        showValueModal: { open: false, name: '', value: '' },
        importModal: { open: false, content: '' },
        confirmDeleteModal: { open: false, name: '' },

        // ===== Computed =====
        get filteredManagedKeys() {
          if (!this.search) return this.managedKeys;
          const q = this.search.toLowerCase();
          return this.managedKeys.filter(k => k.name.toLowerCase().includes(q));
        },

        // ===== i18n helper =====
        t(key) {
          const dict = I18N[this.lang] || I18N.en;
          const tmpl = dict[key] || I18N.en[key] || key;
          // Replace {n}, {total} placeholders
          return tmpl;
        },

        // ===== Init =====
        async init() {
          // Lang preference
          this.lang = localStorage.getItem('lang') || navigator.language.startsWith('zh') ? 'zh' : 'en';
          this.applyLang();
          this.lang = localStorage.getItem('lang') || this.lang;

          // Theme
          this.dark = localStorage.getItem('dark') !== null
            ? localStorage.getItem('dark') === 'true'
            : window.matchMedia('(prefers-color-scheme: dark)').matches;
          this.applyTheme();

          // Load
          await Promise.all([this.refresh(), this.loadDiscover(), this.loadTemplates(), this.loadInfo()]);

          // Init Lucide icons (after DOM settles)
          this.$nextTick(() => this.initIcons());

          // Watch for future DOM changes (Alpine x-show / x-if / list renders)
          // and auto-convert any new [data-lucide] elements. This is the
          // bulletproof way to keep icons in sync with Alpine's reactivity.
          this.initIconObserver();
        },

        initIcons() {
          if (window.lucide) window.lucide.createIcons();
        },

        initIconObserver() {
          // Debounced createIcons — MutationObserver fires on every DOM
          // mutation, which can be hundreds per render. Throttle to once
          // per animation frame.
          let scheduled = false;
          this._iconObserver = new MutationObserver(() => {
            if (scheduled) return;
            scheduled = true;
            requestAnimationFrame(() => {
              scheduled = false;
              if (window.lucide) window.lucide.createIcons();
            });
          });
          this._iconObserver.observe(document.body, {
            childList: true,
            subtree: true,
          });
        },

        applyLang() {
          document.body.dataset.lang = this.lang;
        },

        toggleLang() {
          this.lang = this.lang === 'en' ? 'zh' : 'en';
          localStorage.setItem('lang', this.lang);
          this.applyLang();
          this.$nextTick(() => this.initIcons());
        },

        applyTheme() {
          document.body.classList.toggle('theme-dark', this.dark);
          document.body.classList.toggle('theme-light', !this.dark);
          localStorage.setItem('dark', this.dark);
          this.$nextTick(() => this.initIcons());
        },

        toggleDark() {
          this.dark = !this.dark;
          this.applyTheme();
        },

        // ===== API =====
        async refresh() {
          this.loading = true;
          try {
            const r = await fetch('/api/keys');
            this.managedKeys = (await r.json()).items || [];
            this.backendDown = false;
          } catch (e) {
            this.handleBackendDown('Failed to load: ' + e.message);
          } finally {
            this.loading = false;
          }
        },

        async loadDiscover() {
          this.discoverLoading = true;
          try {
            const r = await fetch('/api/discover');
            this.discover = await r.json();
            this.backendDown = false;
          } catch (e) {
            this.handleBackendDown('Discover failed: ' + e.message);
          } finally {
            this.discoverLoading = false;
            this.$nextTick(() => this.initIcons());
          }
        },

        handleBackendDown(msg) {
          this.backendDown = true;
          this.showToast(msg, 'error');
        },

        async retryBackend() {
          // Quick re-check if backend is back up
          try {
            const r = await fetch('/api/info');
            if (r.ok) {
              this.backendDown = false;
              await this.refresh();
              await this.loadDiscover();
              this.showToast(this.lang === 'zh' ? '已重新连接' : 'Reconnected', 'success');
            }
          } catch {
            this.showToast(
              this.lang === 'zh' ? '后端仍无响应 — 请重启 llm-keyring.exe' : 'Backend still down — restart llm-keyring.exe',
              'error'
            );
          }
        },

        async loadTemplates() {
          try {
            const r = await fetch('/api/templates');
            this.templates = (await r.json()).templates || [];
          } catch (e) { /* non-fatal */ }
        },

        async loadInfo() {
          try {
            const r = await fetch('/api/info');
            this.info = await r.json();
          } catch (e) { /* non-fatal */ }
        },

        // ===== Templates =====
        filteredTemplates() {
          if (!this.templateSearch) return this.templates;
          const q = this.templateSearch.toLowerCase();
          return this.templates.filter(t =>
            t.name.toLowerCase().includes(q) ||
            t.provider.toLowerCase().includes(q)
          );
        },

        groupedTemplates() {
          const groups = {};
          for (const t of this.filteredTemplates()) {
            if (!groups[t.category]) groups[t.category] = [];
            groups[t.category].push(t);
          }
          return groups;
        },

        applyTemplate(t) {
          this.templatesOpen = false;
          this.modal = { open: true, mode: 'create', name: t.name, value: '', error: '', showValue: false };
          this.$nextTick(() => this.initIcons());
        },

        // ===== Add / Edit =====
        openAdd() {
          this.modal = { open: true, mode: 'create', name: '', value: '', error: '', showValue: false };
          this.$nextTick(() => this.initIcons());
        },

        async openEdit(name) {
          try {
            const r = await fetch(`/api/keys/${encodeURIComponent(name)}/value`);
            if (!r.ok) throw new Error('Failed');
            const data = await r.json();
            this.modal = { open: true, mode: 'edit', name: data.name, value: data.value, error: '', showValue: false };
            this.$nextTick(() => this.initIcons());
          } catch (e) {
            this.showToast('Failed to load: ' + e.message, 'error');
          }
        },

        closeModal() {
          this.modal.open = false;
          this.modal.error = '';
        },

        async submitModal() {
          const name = this.modal.name.trim();
          const value = this.modal.value;
          if (!name) { this.modal.error = this.lang === 'zh' ? '名称必填' : 'Name required'; return; }
          if (!value) { this.modal.error = this.lang === 'zh' ? '值必填' : 'Value required'; return; }
          if (!/^[A-Za-z0-9_]+$/.test(name)) {
            this.modal.error = this.lang === 'zh' ? '名称只能包含字母、数字、下划线' : 'Only letters, digits, underscores';
            return;
          }

          const isEdit = this.modal.mode === 'edit';
          const url = isEdit ? `/api/keys/${encodeURIComponent(name)}` : '/api/keys';
          const method = isEdit ? 'PUT' : 'POST';

          try {
            const r = await fetch(url, {
              method,
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ name, value }),
            });
            if (!r.ok) {
              const err = await r.json().catch(() => ({ detail: r.statusText }));
              throw new Error(err.detail || 'Failed');
            }
            this.showToast(isEdit ? (this.lang === 'zh' ? `已更新 ${name}` : `Updated ${name}`) : (this.lang === 'zh' ? `已添加 ${name}` : `Added ${name}`), 'success');
            this.closeModal();
            await Promise.all([this.refresh(), this.loadDiscover()]);
          } catch (e) {
            this.modal.error = e.message;
          }
        },

        // ===== Show / Copy =====
        async showValue(name) {
          try {
            const r = await fetch(`/api/keys/${encodeURIComponent(name)}/value`);
            if (!r.ok) throw new Error('Failed');
            const data = await r.json();
            this.showValueModal = { open: true, name: data.name, value: data.value };
            this.$nextTick(() => this.initIcons());
          } catch (e) {
            this.showToast('Failed: ' + e.message, 'error');
          }
        },

        async copyValue(name) {
          try {
            const r = await fetch(`/api/keys/${encodeURIComponent(name)}/value`);
            const data = await r.json();
            await this.copyToClipboard(data.value, this.t('copied'));
          } catch (e) {
            this.showToast('Copy failed', 'error');
          }
        },

        async copyToClipboard(text, msg) {
          try {
            await navigator.clipboard.writeText(text);
            this.showToast(msg || this.t('copied'), 'success');
          } catch {
            const ta = document.createElement('textarea');
            ta.value = text;
            document.body.appendChild(ta);
            ta.select();
            try { document.execCommand('copy'); this.showToast(msg || this.t('copied'), 'success'); }
            catch { this.showToast('Copy failed', 'error'); }
            document.body.removeChild(ta);
          }
        },

        // ===== Delete =====
        confirmDelete(name) {
          this.confirmDeleteModal = { open: true, name };
          this.$nextTick(() => this.initIcons());
        },

        async executeDelete() {
          const name = this.confirmDeleteModal.name;
          this.confirmDeleteModal.open = false;
          try {
            const r = await fetch(`/api/keys/${encodeURIComponent(name)}`, { method: 'DELETE' });
            if (!r.ok) {
              const err = await r.json().catch(() => ({ detail: r.statusText }));
              throw new Error(err.detail || 'Failed');
            }
            this.showToast(this.lang === 'zh' ? `已删除 ${name}` : `Deleted ${name}`, 'success');
            await Promise.all([this.refresh(), this.loadDiscover()]);
          } catch (e) {
            this.showToast('Delete failed: ' + e.message, 'error');
          }
        },

        // ===== Adopt / Unadopt =====
        async adoptKey(name) {
          try {
            const r = await fetch('/api/adopt', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ names: [name] }),
            });
            const data = await r.json();
            if (data.adopted_count === 1) {
              this.showToast(this.lang === 'zh' ? `已导入 ${name}` : `Adopted ${name}`, 'success');
            } else {
              this.showToast(this.lang === 'zh' ? '已管理' : 'Already managed', 'info');
            }
            await Promise.all([this.refresh(), this.loadDiscover()]);
          } catch (e) {
            this.showToast('Adopt failed: ' + e.message, 'error');
          }
        },

        async adoptAll() {
          const names = this.discover.adoptable.map(k => k.name);
          if (names.length === 0) return;
          try {
            const r = await fetch('/api/adopt', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ names }),
            });
            const data = await r.json();
            this.showToast(
              this.lang === 'zh'
                ? `已导入 ${data.adopted_count} 个，跳过 ${data.skipped_count} 个`
                : `Adopted ${data.adopted_count}, skipped ${data.skipped_count}`,
              'success'
            );
            await Promise.all([this.refresh(), this.loadDiscover()]);
          } catch (e) {
            this.showToast('Failed: ' + e.message, 'error');
          }
        },

        async unadoptKey(name) {
          try {
            const r = await fetch('/api/unadopt', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ name }),
            });
            const data = await r.json();
            if (data.unadopted) {
              this.showToast(this.lang === 'zh' ? `已移除 ${name}` : `Removed ${name}`, 'success');
            }
            await Promise.all([this.refresh(), this.loadDiscover()]);
          } catch (e) {
            this.showToast('Failed: ' + e.message, 'error');
          }
        },

        // ===== Import / Export =====
        openImport() {
          this.importModal = { open: true, content: '' };
          this.$nextTick(() => this.initIcons());
        },

        async submitImport() {
          const content = this.importModal.content;
          if (!content.trim()) {
            this.showToast(this.lang === 'zh' ? '请先粘贴 .env 内容' : 'Paste .env content first', 'error');
            return;
          }
          try {
            const r = await fetch('/api/import', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ content }),
            });
            const data = await r.json();
            const parts = [];
            if (data.created_count > 0) parts.push(`✓ ${data.created_count}`);
            if (data.skipped_count > 0) parts.push(`⊘ ${data.skipped_count}`);
            if (data.error_count > 0) parts.push(`✕ ${data.error_count}`);
            this.showToast(parts.join(' · ') || 'Done', data.error_count > 0 ? 'error' : 'success');
            this.importModal.open = false;
            await Promise.all([this.refresh(), this.loadDiscover()]);
          } catch (e) {
            this.showToast('Failed: ' + e.message, 'error');
          }
        },

        async exportEnv() {
          // Export .env with real plaintext values.
          // The file includes a WARNING header reminding the user
          // not to commit it. This is the explicit purpose of Export:
          // to give the user a file they can `source` or use with
          // --env-file for Docker / CI / migration.
          try {
            const r = await fetch('/api/export', { method: 'POST' });
            const text = await r.text();
            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            const ts = new Date().toISOString().slice(0, 10);
            a.href = url;
            a.download = `llm-keyring-env-${ts}.env`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            this.showToast(
              this.lang === 'zh'
                ? `已导出 llm-keyring-env-${ts}.env（含明文 key，请妥善保管）`
                : `Exported llm-keyring-env-${ts}.env (contains plaintext keys — handle with care)`,
              'info'
            );
          } catch (e) {
            this.showToast('Export failed: ' + e.message, 'error');
          }
        },

        // ===== Toast =====
        showToast(message, type = 'info', duration = 2200) {
          this.toast = { visible: true, message, type };
          setTimeout(() => { this.toast.visible = false; }, duration);
        },

        // ===== Chat =====
        async onChatKeyChange() {
          // Try to resolve base URL + model suggestions from /api/providers
          if (!this.chatState.keyName) {
            this.chatState.baseUrl = '';
            this.chatState.modelSuggestions = [];
            return;
          }
          this.chatState.testResult = null;
          try {
            const r = await fetch('/api/providers');
            const data = await r.json();
            const upper = this.chatState.keyName.toUpperCase();
            const match = data.providers.find(p =>
              p.name === this.chatState.keyName ||
              p.name.toUpperCase() === upper ||
              upper.startsWith(p.name.toUpperCase().replace(/_API_KEY$|_TOKEN$/, '')) ||
              p.name.toUpperCase().replace(/_API_KEY$|_TOKEN$/, '').startsWith(upper)
            );
            if (match) {
              if (!this.chatState.baseUrl && match.base_url) {
                this.chatState.baseUrl = match.base_url;
              }
              this.chatState.modelSuggestions = match.default_models || [];
              if (!this.chatState.model && match.default_models?.length) {
                this.chatState.model = match.default_models[0];
              }
            }
          } catch (e) {
            // best-effort
          }
        },

        async loadModelsForChatKey() {
          if (!this.chatState.keyName) return;
          this.chatState.loadingModels = true;
          try {
            const r = await fetch('/api/test', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                name: this.chatState.keyName,
                base_url: this.chatState.baseUrl || null,
              }),
            });
            const data = await r.json();
            if (data.models && data.models.length) {
              this.chatState.modelSuggestions = data.models;
              if (!this.chatState.model) this.chatState.model = data.models[0];
              this.showToast(this.t('chatRefreshModels') + ' ✓', 'success');
            } else {
              this.showToast(this.lang === 'zh' ? '未取到模型列表' : 'No models returned', 'info');
            }
          } catch (e) {
            this.showToast(this.t('chatFailed') + ': ' + e.message, 'error');
          } finally {
            this.chatState.loadingModels = false;
            this.$nextTick(() => this.initIcons());
          }
        },

        async testChatKey() {
          if (!this.chatState.keyName) return;
          this.chatState.testing = true;
          try {
            const r = await fetch('/api/test', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                name: this.chatState.keyName,
                base_url: this.chatState.baseUrl || null,
              }),
            });
            const data = await r.json();
            this.chatState.testResult = data;
            if (data.supported_count > 0) {
              this.showToast(
                this.lang === 'zh'
                  ? `检测到 ${data.supported_count} 个能力`
                  : `Detected ${data.supported_count} capabilities`,
                'success'
              );
            } else {
              this.showToast(this.lang === 'zh' ? '未检测到能力' : 'No capabilities detected', 'info');
            }
            if (data.models?.length) {
              this.chatState.modelSuggestions = data.models;
              if (!this.chatState.model) this.chatState.model = data.models[0];
            }
          } catch (e) {
            this.showToast(this.t('chatFailed') + ': ' + e.message, 'error');
          } finally {
            this.chatState.testing = false;
            this.$nextTick(() => this.initIcons());
          }
        },

        async sendChat() {
          const text = this.chatState.input.trim();
          if (!text || this.chatState.streaming) return;
          if (!this.chatState.keyName) {
            this.showToast(this.t('chatNoKey'), 'error');
            return;
          }
          if (!this.chatState.baseUrl) {
            this.showToast(this.t('chatNoBaseUrl'), 'error');
            return;
          }
          if (!this.chatState.model) {
            this.showToast(this.lang === 'zh' ? '请填写模型名' : 'Model required', 'error');
            return;
          }

          // Add user message
          this.chatState.messages.push({ role: 'user', content: text });
          this.chatState.input = '';
          // Capture assistant message index NOW (stable reference, not
          // re-resolved through the array on every delta — avoids Alpine
          // reactivity issues with arr[len-1])
          this.chatState.messages.push({ role: 'assistant', content: '' });
          const assistantIdx = this.chatState.messages.length - 1;
          this.chatState.streaming = true;
          this.scrollChatToBottom();

          try {
            const resp = await fetch('/api/chat', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                name: this.chatState.keyName,
                base_url: this.chatState.baseUrl,
                model: this.chatState.model,
                messages: this.chatState.messages
                  .filter(m => m.role === 'user' || (m.role === 'assistant' && m.content))
                  .map(m => ({ role: m.role, content: m.content })),
              }),
            });

            if (!resp.ok) {
              const errText = await resp.text();
              this.chatState.messages[assistantIdx].error =
                `HTTP ${resp.status}: ${errText.slice(0, 200)}`;
              this.chatState.streaming = false;
              this.$nextTick(() => this.initIcons());
              return;
            }

            // Read SSE stream — accumulate and split by lines
            const reader = resp.body.getReader();
            const decoder = new TextDecoder();
            let buf = '';
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              buf += decoder.decode(value, { stream: true });
              // Split on newlines; keep last (possibly incomplete) line in buf
              let nlIdx;
              while ((nlIdx = buf.indexOf('\n')) !== -1) {
                const line = buf.slice(0, nlIdx).replace(/\r$/, '');
                buf = buf.slice(nlIdx + 1);
                const trimmed = line.trim();
                if (!trimmed.startsWith('data:')) continue;
                const payload = trimmed.slice(5).trim();
                if (payload === '[DONE]') continue;
                let json;
                try { json = JSON.parse(payload); } catch { continue; }
                const delta = json.choices?.[0]?.delta?.content;
                if (delta) {
                  this.chatState.messages[assistantIdx].content += delta;
                  this.scrollChatToBottom();
                }
                if (json.error) {
                  this.chatState.messages[assistantIdx].error = json.error;
                }
              }
            }
            // Process any trailing line (no final newline)
            const tail = buf.trim();
            if (tail.startsWith('data:') && tail.slice(5).trim() !== '[DONE]') {
              try {
                const json = JSON.parse(tail.slice(5).trim());
                const delta = json.choices?.[0]?.delta?.content;
                if (delta) {
                  this.chatState.messages[assistantIdx].content += delta;
                  this.scrollChatToBottom();
                }
              } catch {}
            }
          } catch (e) {
            this.chatState.messages[assistantIdx].error = e.message;
          } finally {
            this.chatState.streaming = false;
            this.$nextTick(() => this.initIcons());
          }
        },

        scrollChatToBottom() {
          this.$nextTick(() => {
            const el = this.$refs.chatMessages;
            if (el) el.scrollTop = el.scrollHeight;
          });
        },

        clearChat() {
          this.chatState.messages = [];
        },

        // Override switchView to load models when entering chat
        switchView(v) {
          this.view = v;
          if (v === 'discover') this.loadDiscover();
          if (v === 'chat' && this.chatState.keyName) this.onChatKeyChange();
          this.$nextTick(() => this.initIcons());
        },
      };
    }
  </script>
</body>
</html>
